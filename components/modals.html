<div id="historyModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 550px; max-height: 80vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 id="historyTitle" style="margin-bottom: 0;">Deal History</h3>
            <button id="closeHistoryBtn" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b;">&times;</button>
        </div>
        <div class="search-history">
            <div class="search-box">
                <input type="text" id="historySearchInput" placeholder="Search by counterparty or comment" data-key="searchPlaceholder">
            </div>
        </div>
        <div class="filter-buttons">
            <button class="filter-pill active" data-history-filter="all" data-key="filterAll">All</button>
            <button class="filter-pill" data-history-filter="buy" data-key="filterBuys">Buys</button>
            <button class="filter-pill" data-history-filter="sell" data-key="filterSells">Sells</button>
        </div>
        <div id="historyDealsList"></div>
    </div>
</div>
