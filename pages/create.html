<div class="card">
    <h2 data-i18n="create.title">➕ Новая сделка</h2>
    <form id="dealForm">
        <div class="input-group">
            <label data-i18n="create.type">Тип операции</label>
            <div class="select-wrapper">
                <select id="dealType" required>
                    <option value="buy" data-i18n="create.buy">Покупка USDT</option>
                    <option value="sell" data-i18n="create.sell">Продажа USDT</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label data-i18n="create.date">Дата сделки (ДД.ММ.ГГ)</label>
            <input type="text" id="dealDate" data-i18n-placeholder="create.date" placeholder="" maxlength="10">
        </div>
        <div class="input-group">
            <label data-i18n="create.amountRub">Сумма оплаты (RUB)</label>
            <input type="number" id="amountPaid" data-i18n-placeholder="create.amountRub" placeholder="" step="0.01">
        </div>
        <div class="input-group">
            <label data-i18n="create.amountUsdt">Количество USDT</label>
            <input type="number" id="usdtAmount" data-i18n-placeholder="create.amountUsdt" placeholder="" step="0.01">
        </div>
        <div class="input-group">
            <label data-i18n="create.price">Цена за 1 USDT</label>
            <input type="number" id="pricePerUsdt" data-i18n-placeholder="create.price" placeholder="Цена по которой купили/продали USDT" step="0.01">
        </div>
        <div class="input-group">
            <label data-i18n="create.paymentMethod">Метод оплаты</label>
            <input type="text" id="counterparty" data-i18n-placeholder="create.paymentMethod" placeholder="Сбербанк/Т-банк/СБП">
        </div>
        <div class="input-group">
            <label data-i18n="create.dealNumber">Номер сделки</label>
            <input type="text" id="dealNumber" data-i18n-placeholder="create.dealNumber" placeholder="">
        </div>
        <div class="input-group">
            <label data-i18n="create.checkLink">Ссылка на чек оплаты</label>
            <textarea id="comment" rows="2" data-i18n-placeholder="create.checkLink"></textarea>
        </div>
        <button type="submit" class="btn" data-i18n="create.submit">✨ Записать сделку</button>
    </form>
</div>
