<div class="card">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
        <div style="font-size: 32px;">🛟</div>
        <h2 style="margin-bottom: 0;" data-i18n="more.support">Техподдержка</h2>
    </div>
    <p style="margin-bottom: 16px; font-size: 13px; color: #64748b;" data-i18n="more.supportDesc">Напишите нам, если нашли баг или есть идеи!</p>
    <button id="supportBtn" class="btn" data-i18n="more.supportBtn">📩 Открыть чат</button>

        <button id="importReplaceBtn" class="btn" data-i18n="more.importReplace">📥 Заменить всё</button>
        <button id="importAddBtn" class="btn-green" data-i18n="more.importAdd">📥 Добавить</button>
    </div>
</div>

<div class="card">
    <h2 data-i18n="more.syncStatus">☁️ Статус синхронизации</h2>
    <div id="syncStatusContainer" class="sync-status-card"></div>
