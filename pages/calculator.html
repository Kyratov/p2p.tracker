<div class="card">
    <h2 data-i18n="calculator.title">🧮 Узнать количество покупаемого USDT</h2>
    <div class="input-group">
        <label data-i18n="calculator.rubAmount">Сумма в RUB</label>
        <input type="number" id="calcRub" data-i18n-placeholder="calculator.rubAmount" placeholder="Введите сумму">
    </div>
    <div class="input-group">
        <label data-i18n="calculator.usdtRate">Курс USDT (₽)</label>
        <input type="number" id="calcRate" data-i18n-placeholder="calculator.usdtRate" placeholder="Курс за 1 USDT" value="">
    </div>
    <button id="calcBtn" class="btn" data-i18n="calculator.calculate">Рассчитать</button>
    <input type="text" id="calcResultField" class="result-field" readonly data-i18n-placeholder="calculator.resultPlaceholder" placeholder="Результат появится здесь">
</div>
<div class="card">
    <h2 data-i18n="calculator.secondTitle">📊 Узнать по какому курсу купили USDT</h2>
    <div class="input-group">
        <label data-i18n="calculator.secondRub">Сумма RUB</label>
        <input type="number" id="quickRub" data-i18n-placeholder="calculator.secondRub" placeholder="Сумма">
    </div>
    <div class="input-group">
        <label data-i18n="calculator.secondUsdt">Получено USDT</label>
        <input type="number" id="quickUsdt" data-i18n-placeholder="calculator.secondUsdt" placeholder="USDT">
    </div>
    <button id="quickCalcBtn" class="btn-green" data-i18n="calculator.secondCalculate">Узнать цену</button>
    <input type="text" id="quickResultField" class="result-field" readonly data-i18n-placeholder="calculator.resultPlaceholder" placeholder="Результат появится здесь">
</div>
